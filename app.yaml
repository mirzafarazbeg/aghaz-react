runtime: nodejs20
instance_class: F2
env_variables:
  NODE_ENV: production

automatic_scaling:
  min_instances: 1
  max_instances: 50
  target_cpu_utilization: 0.6
  target_throughput_utilization: 0.6

handlers:
  - url: /
    static_files: build/index.html
    upload: build/index.html

  - url: /(.*)
    static_files: build/\1
    upload: build/(.*)

error_handlers:
  - file: build/index.html
